<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagamento recebido | São João da Fé</title>
  <style>
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#06133c,#09256f);
      color:#142033;
      padding:18px;
    }
    .card {
      width:min(520px,100%);
      background:#fffdf6;
      border-radius:26px;
      padding:24px;
      box-shadow:0 18px 45px rgba(0,0,0,.22);
      text-align:center;
    }
    h1 {
      margin:0 0 8px;
      color:#06133c;
      letter-spacing:-.04em;
    }
    p {
      color:#64748b;
      line-height:1.45;
    }
    .status {
      margin-top:14px;
      background:#f8fafc;
      border-radius:16px;
      padding:14px;
      font-weight:800;
    }
    a {
      display:inline-block;
      margin-top:14px;
      color:#09256f;
      font-weight:900;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Obrigado!</h1>
    <p>Seu pagamento foi finalizado na InfinitePay. A confirmação será enviada automaticamente para o controle de entrega da escola.</p>
    <div class="status" id="statusBox">Verificando pagamento...</div>
    <a id="receiptLink" href="#" target="_blank" rel="noopener" style="display:none;">Abrir comprovante</a>
  </main>

  <script>
    async function verificar() {
      const params = new URLSearchParams(location.search);
      const receipt = params.get("receipt_url");
      const orderNsu = params.get("order_nsu");
      const transactionNsu = params.get("transaction_nsu");
      const slug = params.get("slug");

      if (receipt) {
        const a = document.getElementById("receiptLink");
        a.href = receipt;
        a.style.display = "inline-block";
      }

      if (!orderNsu) {
        document.getElementById("statusBox").textContent = "Pagamento concluído. Pode procurar a secretaria para entrega.";
        return;
      }

      try {
        const resp = await fetch("/api/verificar-pagamento", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            order_nsu: orderNsu,
            transaction_nsu: transactionNsu,
            slug
          })
        });

        const data = await resp.json();

        if (resp.ok && data.paid) {
          document.getElementById("statusBox").textContent = "Pagamento confirmado. Seu pedido já está no controle da escola.";
        } else {
          document.getElementById("statusBox").textContent = "Pagamento recebido. A confirmação pode levar alguns instantes.";
        }
      } catch {
        document.getElementById("statusBox").textContent = "Pagamento recebido. A secretaria poderá conferir pelo comprovante.";
      }
    }

    verificar();
  </script>
</body>
</html>
